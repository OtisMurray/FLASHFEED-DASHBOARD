# Railway provides $API_URL as an environment variable for the backend service
# If not set, fall back to the backend service name on Railway
server {
    listen       80;
    server_name  _;

    # Serve built frontend
    root   /usr/share/nginx/html;
    index  index.html;

    # API proxy to backend service
    location /api/ {
        # Use Railway's service-to-service communication
        # $API_URL is automatically set by Railway or you can set it manually
        set $backend "${API_URL:-http://backend:3001}";
        proxy_pass $backend;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSocket support for potential future use
    location /ws/ {
        proxy_pass ${API_URL:-http://backend:3001};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}